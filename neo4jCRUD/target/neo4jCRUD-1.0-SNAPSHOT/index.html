<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sistema de Gestión de Configuraciones</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    body { background-color: #f8f9fa; }
    .hero-section { padding: 60px 0; background: #fff; border-bottom: 1px solid #dee2e6; }
  </style>
</head>
<body>

<div class="hero-section text-center">
  <div class="container">
    <i class="bi bi-diagram-3-fill display-1 text-primary"></i>
    <h1 class="mt-3 fw-bold">Configuraciones de Aplicación</h1>
    <p class="lead text-muted">Gestión de entornos y módulos sobre Neo4j Graph Database</p>
  </div>
</div>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow-sm text-center p-4">
        <div class="card-body">
          <h5 class="card-title">Módulo de Administración</h5>
          <p class="card-text text-muted small">Accede para gestionar parámetros, entornos (dev/test/prod) y dependencias entre módulos.</p>

          <a href="configuraciones/ConfiguracionController" class="btn btn-primary btn-lg w-100">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar a la aplicación
          </a>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</html>
